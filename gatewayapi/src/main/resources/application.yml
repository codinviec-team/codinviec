spring:

  application:
    name: gatewayapi
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8082
              order: 1
              predicates:
                - Path=/api/auth/**, /oauth2/**, /login/oauth2/**

            - id: codinviec
              uri: http://localhost:8081
              order: 2
              predicates:
                - Path=/api/**
server:
  port: 8080


#jwt
jwt:
  secret: ${JWT_SECRET}
  expiration:
    access: ${JWT_ACCESS_EXPIRED} #15m
    refresh: ${JWT_REFRESH_EXPIRED} #7d


#Kiểm tra mapping path
management:
  endpoints:
    web:
      exposure:
        include: gateway, health, info
  endpoint:
    gateway:
      enabled: true

#log lỗi
logging:
  level:
    org.springframework.cloud.gateway: TRACE

redis:
  host: ${REDIS_HOST}
  password: ${REDIS_PASSWORD}
  port: ${REDIS_PORT}

