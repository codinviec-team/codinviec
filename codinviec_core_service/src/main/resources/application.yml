spring:
  dotenv:
    enabled: true
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB
      enabled: true
  application:
    name: codinviec
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME}

    hikari:
      # ===== Pool Sizing =====
      # Công thức: pool size = (core_count * 2) + effective_spindle_count
      # Ví dụ: server 4 CPU cores, SSD → 4*2+1 = 9 → dùng 10
      minimum-idle: 5
      maximum-pool-size: 10

      # ===== Timeout Settings =====
      connection-timeout: 30000      # 30s - chờ lấy connection từ pool
      idle-timeout: 600000           # 10m - connection idle bao lâu thì đóng
      max-lifetime: 1800000          # 30m - tuổi thọ tối đa connection (< MySQL wait_timeout)
      keepalive-time: 60000          # 1m  - ping giữ connection sống
      validation-timeout: 5000       # 5s  - timeout khi validate connection

      # ===== Pool Naming =====
      pool-name: MyApp-HikariPool

      # ===== Performance Properties =====
      data-source-properties:
        # Prepared Statement Cache
        cachePrepStmts: true
        prepStmtCacheSize: 250         # số lượng stmt cache per connection
        prepStmtCacheSqlLimit: 2048    # độ dài SQL tối đa được cache

        # Server-side prepared statements
        useServerPrepStmts: true

        # Tối ưu session/transaction state
        useLocalSessionState: true
        useLocalTransactionState: true

        # Cache metadata
        cacheResultSetMetadata: true
        cacheCallableStmts: true

        # Connection timeout
        connectTimeout: 5000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOSTRAP_SERVER}
    consumer:
      group-id: email-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: manual
server:
  port: ${SERVER_PORT}

jwt:
  secret: ${JWT_SECRET}
  expiration:
    access: ${JWT_ACCESS_EXPIRED} #15m
    refresh: ${JWT_REFRESH_EXPIRED} #7d

upload:
  image: ${UPLOAD_IMAGE}
  link:  ${UPLOAD_LINK}

client:
  url: ${CLIENT_URL}

redis:
  host: ${REDIS_HOST}
  password: ${REDIS_PASSWORD}
  port: ${REDIS_PORT}

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha

vnpay:
  tmn-code: ${VNP_TMNCODE}
  hash-secret: ${VNP_HASHSECRET}
  pay-url: ${VNP_URL}
  return-url: ${VNP_RETURN_URL}
  ipn-url: ${VNP_IPN_URL}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE}
